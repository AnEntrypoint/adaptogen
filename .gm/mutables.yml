- id: m-bun-sqlite
  question: Is bun:sqlite available in this runtime and what version of SQLite does it embed?
  status: witnessed
  witness_kind: exec
  note: Backbone of durability/perf. Resolve via exec_js requiring bun:sqlite and selecting sqlite_version().
  witness_evidence: 'exec `bun -e require(''bun:sqlite'')` -> {bun_version:1.3.8, sqlite_version:3.51.2}. bun:sqlite available; library targets bun runtime. Note: exec_js spool verb runs under node and cannot import bun: scheme, so bun-native witnesses use `bun -e`.'
- id: m-fts5
  question: Does the embedded SQLite support FTS5 (for node-query full-text recall)?
  status: witnessed
  witness_kind: exec
  note: If absent, node-query-fts must use the LIKE fallback path. Resolve by attempting CREATE VIRTUAL TABLE ... USING fts5 in a temp db.
  witness_evidence: exec `CREATE VIRTUAL TABLE t USING fts5(x)` under bun:sqlite 3.51.2 returned fts5:yes. FTS5 is the primary recall path; LIKE fallback retained for builds lacking it.
- id: m-git-remote
  question: Is there a git remote (origin) to push to, given the dir is not currently a git repo?
  status: witnessed
  witness_kind: exec
  note: Affects whether COMPLETE can push or must report blockedBy external. Resolve after git init via git remote -v.
  witness_evidence: 'exec `git rev-parse --is-inside-work-tree` -> fatal: not a git repository; `git remote -v` empty. No repo, no origin. git-init-commit-push will init+commit locally; push is blockedBy external until the user supplies a remote.'
