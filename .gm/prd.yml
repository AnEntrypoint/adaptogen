- id: stress-e2e-crash-recovery
  title: 'E2E stress: agent session integrating storage+FSM+enforcement+intuition through a crash and recovery'
  detail: 'Hardest reachable node, scheduled first to prove the design. Drive a full session: create memory nodes, define a safe transition zone, add DAG dependencies, transition across the FSM hitting BOTH soft (warn+count) and hard (block) enforcement, apply rewards updating intuition stats, checkpoint, simulate a crash mid-write (partial/truncated event), boot recovery (latest snapshot + replay tail + hash-chain verify), assert integrity intact and that cursor/stats/zone/dep state are consistent, then continue working. Exercises concurrency, partial failure, and real input together.'
  deps: []
  validation: bun test e2e crash-recovery suite green; integrity report clean; post-recovery cursor and intuition stats equal pre-crash projection
  priority: first
  blockedBy: null
  status: completed
  witness: 'test/stress-e2e.test.ts green under `bun test` (61 pass, 0 fail): full session creates memory nodes, defines safe zone, adds DAG deps, hits soft(warn) + hard(block) enforcement, applies trace reward, checkpoints, injects a torn trailing event, store.recover() trims it (trimmed=1), then verifyIntegrity().ok && validate().ok && cursor==pre-crash && ship node visits preserved.'
- id: proj-scaffold
  title: 'Project scaffold: package.json, tsconfig, dir layout, .gitignore'
  detail: Bun + TypeScript package named dstate. package.json with scripts (build/test/typecheck/cli), tsconfig (strict, ESNext, moduleResolution bundler), src/ + test/ layout, .gitignore with managed gm block. Zero runtime deps beyond built-in bun:sqlite; TypeScript dev-only.
  deps: []
  validation: bun install ok; bun run typecheck clean on empty stubs
  status: pending
- id: dep-survey
  title: 'Dependency survey: justify bespoke vs library for FSM/graph/store'
  detail: 'Survey XState (static machines, poor fit for self-evolving runtime graph+intuition), graphology (in-memory only, topo/cycle are ~20 lines bespoke), bun:sqlite (built-in, durable, chosen). Decide minimal-surface: built-in sqlite + hand-rolled small graph algos + no FSM lib. Record rationale so we are not carrying a drift-prone reimplementation of an upstream.'
  deps: []
  validation: decision doc lists each candidate with net-surface verdict
  status: pending
- id: types-core
  title: 'Core types: Node, Edge, Zone, Policy, Guard, Stat, Event, Cursor, Checkpoint, enums'
  detail: 'All TS types: NodeStatus(active|archived|deprecated), EdgeKind(transition|dependency), EnforcementMode(off|soft|hard), Event union (NodeCreated/Updated, EdgeCreated/Removed, TransitionTaken, BlockedAttempt, ZoneDefined, PolicySet, StatUpdated, RewardApplied, SnapshotTaken, Migrated, CheckpointCreated). Result<T,E> type. Branded ids.'
  deps:
  - proj-scaffold
  validation: typecheck clean; types exported from index
  status: pending
- id: ids-gen
  title: Monotonic collision-resistant id generation (ULID-like)
  detail: Sortable monotonic ids (timestamp+counter+entropy) for nodes/edges/events. Seedable for deterministic tests. No reliance on wall-clock uniqueness alone; monotonic counter guards same-ms collisions.
  deps:
  - proj-scaffold
  validation: 'unit: 100k ids unique, lexically sorted by creation order'
  status: pending
- id: hash-chain
  title: Per-event checksum + chained hash for tamper/corruption detection
  detail: Each event carries sha256(payload) and prev_hash linking to prior event hash, forming a chain. Boot verifies chain; a break localizes corruption/truncation. Foundation for crash recovery integrity.
  deps:
  - proj-scaffold
  - types-core
  validation: 'unit: tamper one event -> verify reports exact break seq'
  status: pending
- id: store-db-open
  title: Open bun:sqlite with WAL, foreign_keys, busy_timeout, synchronous
  detail: 'db.ts: open sqlite file, PRAGMA journal_mode=WAL, synchronous=NORMAL, foreign_keys=ON, busy_timeout. In-memory mode for tests. Single connection facade.'
  deps:
  - proj-scaffold
  - dep-survey
  validation: 'exec: open in-memory db, PRAGMA reports WAL'
  status: pending
- id: store-schema
  title: Schema DDL + indices + schema-version migrations
  detail: 'Tables: events, nodes, edges, zones, zone_members, policies, stats, snapshots, checkpoints, meta(schema_version). Indices on edges(from),edges(to),nodes(status),zone_members(zone),events(seq),events(type). FTS5 virtual table for node content (guarded by availability mutable). Migration runner keyed on meta.schema_version.'
  deps:
  - store-db-open
  - types-core
  validation: fresh db creates all tables; re-open is idempotent; migration bumps version
  status: pending
- id: store-events-append
  title: 'Append event: transactional, monotonic seq, hash-chained'
  detail: 'appendEvent(type,payload): assign next seq, compute checksum+prev_hash, insert in a transaction, return event. Single-writer monotonic seq. The sole mutation entry point (event-sourced spine).'
  deps:
  - store-schema
  - hash-chain
  - ids-gen
  validation: 'unit: appended seqs strictly increasing; chain links valid'
  status: pending
- id: store-events-read
  title: Read events by range/seq/type for replay and history
  detail: readEvents({fromSeq,toSeq,type?}) streaming iterator; getEvent(seq). Backs projection rebuild, history-log, audit.
  deps:
  - store-events-append
  validation: 'unit: range query returns contiguous slice in seq order'
  status: pending
- id: store-projection-apply
  title: 'Incremental projection: apply one event to materialized tables'
  detail: 'applyEvent(ev): mutate nodes/edges/zones/stats tables for a single event without full replay. Pure function of (state,event). Keeps live graph hot. Used on every append and during tail replay.'
  deps:
  - store-events-append
  validation: 'unit: apply sequence reproduces same tables as full rebuild'
  status: pending
- id: store-projection-rebuild
  title: Full projection rebuild from event log (recovery/repair)
  detail: 'rebuild(): truncate materialized tables, replay all events through applyEvent. Determinism guarantees projection is a pure fold of the log. Used when projection is suspect.'
  deps:
  - store-projection-apply
  - store-events-read
  validation: 'unit: corrupt a projection row, rebuild restores it from events'
  status: pending
- id: store-snapshot
  title: 'Snapshot: capture projection state at a seq for bounded replay'
  detail: 'snapshot(): persist current materialized tables + last_seq into snapshots. Recovery loads latest snapshot then replays only events after it.'
  deps:
  - store-projection-apply
  validation: 'unit: snapshot at seq N, append more, recovery from snapshot+tail equals full rebuild'
  status: pending
- id: store-compaction
  title: 'Compaction: snapshot + prune superseded events to bound log growth'
  detail: 'compact(): take snapshot, optionally prune events before snapshot seq (configurable retention for audit). Performance/durability: bounds replay cost and disk.'
  deps:
  - store-snapshot
  validation: 'unit: compaction preserves recoverable state; replay cost drops'
  status: pending
- id: store-recovery
  title: 'Boot recovery: load snapshot, replay tail, verify hash chain, detect corruption'
  detail: 'recover(): load latest snapshot, replay events>last_seq via applyEvent, verify hash chain across tail, on break truncate to last good seq and report. Handles partial/truncated trailing event from a crash mid-write.'
  deps:
  - store-snapshot
  - store-projection-rebuild
  - hash-chain
  validation: 'unit: inject truncated trailing event -> recovery trims to last good seq, projection consistent'
  status: pending
- id: store-tx
  title: 'Atomic mutation boundary: wrap multi-statement ops in a transaction'
  detail: 'withTx(fn): BEGIN/COMMIT/ROLLBACK helper so an event-append + projection-apply are atomic; failure rolls back both, leaving no half-applied state.'
  deps:
  - store-db-open
  validation: 'unit: forced error mid-tx leaves db unchanged'
  status: pending
- id: store-concurrency
  title: Single-writer lock + optimistic version stamps
  detail: Process lock-file (or sqlite advisory) so two agents do not corrupt the log; node/edge version field for optimistic concurrency; busy_timeout for readers. Defensive even for single-agent use.
  deps:
  - store-db-open
  - types-core
  validation: 'unit: second writer acquiring lock fails fast; stale-version write rejected'
  status: pending
- id: node-crud
  title: 'Node CRUD: create/update/get/archive/deprecate; payload is memory'
  detail: 'Nodes are state/memory cells: id,kind,label,payload(JSON),tags,status,version,created/updated. Mutations go through events (NodeCreated/Updated). Soft delete via archive/deprecate, never hard-delete (audit).'
  deps:
  - store-projection-apply
  - types-core
  validation: 'unit: create->get roundtrip; update bumps version; archive hides from active queries'
  status: pending
- id: node-query-fts
  title: 'Recall: query nodes by id/tag/kind/status/full-text'
  detail: 'recall(query): structured filters + FTS5 content match (fallback to LIKE if FTS5 unavailable). Returns ranked nodes. This is the memory-read surface.'
  deps:
  - node-crud
  - store-schema
  validation: 'unit: FTS match returns expected nodes; LIKE fallback path covered'
  status: pending
- id: node-similarity-optional
  title: Optional vector/embedding similarity recall with graceful degradation
  detail: Optional cosine-similarity recall over an embedding column when an embedder is configured; absent embedder degrades to FTS without error. Keeps memory retrieval rich but never hard-requires a model.
  deps:
  - node-query-fts
  validation: 'unit: with stub embeddings, nearest-k correct; without, falls back silently'
  status: pending
- id: edge-crud
  title: Edge CRUD for transition + dependency kinds
  detail: 'Edges: id,from,to,kind(transition|dependency),label,guard,enforcement,weight,stats_ref,version. Created/removed via events. Reject edge referencing missing node. Dependency edges additionally gated by cycle check.'
  deps:
  - node-crud
  validation: 'unit: create transition+dependency edges; missing-endpoint rejected'
  status: pending
- id: dag-cycle-check
  title: Reject dependency edge that would create a cycle
  detail: Before adding a dependency edge, DFS/union-find to detect if to-> ...->from path exists; reject with a clear error naming the cycle path. Keeps the dependency graph a true DAG.
  deps:
  - edge-crud
  validation: 'unit: adding back-edge in a chain is rejected with cycle path; transition edges are exempt'
  status: pending
- id: dag-topo
  title: Topological order over dependency edges, cached + invalidated
  detail: Kahn's algorithm topo sort of dependency subgraph; cache result, invalidate on any dependency edge/node change. Powers ready-frontier and ordering.
  deps:
  - dag-cycle-check
  validation: 'unit: topo order respects all deps; cache invalidates on edge add'
  status: pending
- id: dag-ready-frontier
  title: 'Ready frontier: nodes whose dependencies are satisfied'
  detail: 'ready(): given node completion status, return nodes with all dependency-predecessors satisfied and not yet done. Mirrors plugkit''s ready_wave; the agent''s actionable set.'
  deps:
  - dag-topo
  validation: 'unit: frontier excludes nodes with unmet deps; advances as deps complete'
  status: pending
- id: dag-reachability
  title: 'Reachability: ancestors/descendants/reachable set'
  detail: reachable(from), ancestors(n), descendants(n) over both edge kinds (parameterized). Used by zone-mapout, optimize (dead-node detection), and validation.
  deps:
  - edge-crud
  validation: 'unit: reachable set matches BFS expectation on a fixture graph'
  status: pending
- id: fsm-cursor
  title: 'FSM cursor: current state(s), multi-cursor, persisted'
  detail: Cursor = agent's current node(s). Supports single and parallel cursors (concurrent regions). Persisted via events so position survives restart. getCursor/setCursor.
  deps:
  - node-crud
  validation: 'unit: cursor persists across reopen; multi-cursor add/remove works'
  status: pending
- id: fsm-transition
  title: 'transition(to): legality + guard + zone + enforcement + record + stats'
  detail: Core verb. Check a transition edge cursor->to exists; evaluate guard; check zone boundary policy; apply enforcement (off/soft/hard); on allow move cursor and emit TransitionTaken + update stats; on hard-deny emit BlockedAttempt and keep cursor; on soft-violate allow+flag+count. Returns a decision with reason trace.
  deps:
  - fsm-cursor
  - edge-crud
  - enforce-decision
  - stats-update
  validation: 'unit: legal allowed, illegal hard-blocked, soft-violation allowed+counted, all recorded'
  status: pending
- id: fsm-legal-moves
  title: Enumerate legal next transitions from cursor
  detail: 'legalMoves(): transition edges out of cursor that pass guards+zone policy (or are soft-allowed), annotated with enforcement and stats. Feeds suggest() and render.'
  deps:
  - fsm-transition
  validation: 'unit: returns exactly the allowed/soft set, excludes hard-blocked'
  status: pending
- id: fsm-wellformed
  title: FSM well-formedness check
  detail: 'Validate: every transition edge endpoint exists, no transition into an archived/deprecated node, cursor points at a live node, no duplicate parallel transition with conflicting guards. Part of validate-invariants but unit-tested standalone.'
  deps:
  - fsm-transition
  validation: 'unit: malformed FSM flagged with specific reasons'
  status: pending
- id: zone-define
  title: Define a safe limited transition zone (members + policy)
  detail: 'defineZone(name,members,policy): a named subgraph the agent may transition within freely; policy sets intra-zone enforcement and boundary enforcement (soft/hard). The agent maps out its own safe zones.'
  deps:
  - edge-crud
  - types-core
  validation: 'unit: zone created with members; intra/boundary policy stored'
  status: pending
- id: zone-membership
  title: Zone membership add/remove with consistency
  detail: addToZone/removeFromZone; a node may belong to multiple zones; removing a member re-evaluates boundary edges. Membership changes are events.
  deps:
  - zone-define
  validation: 'unit: membership mutation updates boundary classification of affected edges'
  status: pending
- id: zone-boundary-policy
  title: Zone boundary crossing requires a gate; soft/hard
  detail: 'A transition whose endpoints are in different zones is a boundary crossing: enforced per the stricter zone''s boundary policy. Hard = blocked unless an explicit gate edge marks it allowed; soft = warn+count. Implements safe limited transition zones.'
  deps:
  - zone-membership
  - enforce-decision
  validation: 'unit: cross-zone hard transition blocked; gated crossing allowed; soft crossing warned'
  status: pending
- id: zone-nesting
  title: Nested/overlapping zone resolution
  detail: When a node is in multiple/nested zones, resolve effective policy by precedence (innermost or strictest, configurable). Deterministic resolution documented.
  deps:
  - zone-boundary-policy
  validation: 'unit: overlapping zones resolve to documented effective policy'
  status: pending
- id: zone-mapout
  title: Auto-map a safe zone from a reachable safe subset
  detail: 'deriveZone(seed,predicate): BFS from seed over transition edges collecting nodes satisfying a safety predicate, propose a zone. Lets the agent map out its own safe limited transition zones automatically, then ratify.'
  deps:
  - zone-define
  - dag-reachability
  validation: 'unit: derived zone equals expected safe reachable set on fixture'
  status: pending
- id: guard-expr
  title: Safe guard expression language + evaluator (no arbitrary code exec)
  detail: Small sandboxed predicate DSL over a typed context (node payloads, tags, stats, cursor, vars). Supports comparisons, boolean ops, has/in, numeric. Parsed to an AST and interpreted; NEVER eval/Function on agent input. Prevents code injection while letting the agent express policy.
  deps:
  - types-core
  validation: 'unit: valid exprs evaluate; injection attempt (e.g. constructor) rejected at parse'
  status: pending
- id: guard-eval-context
  title: Guard evaluation context assembly
  detail: Build the context object (current node payload, target node, cursor, zone, stats, session vars) passed to guard eval on each transition. Read-only snapshot; guards cannot mutate.
  deps:
  - guard-expr
  - fsm-cursor
  validation: 'unit: guard reads node payload + stats correctly; context immutable'
  status: pending
- id: enforce-decision
  title: 'Enforcement decision function: allow / warn / deny'
  detail: 'decide(edge,context): combine guard result + enforcement mode + zone policy into one of allow|warn(soft-violate)|deny(hard-block), with a structured reason trace for explain. Single source of truth for soft/hard.'
  deps:
  - guard-eval-context
  - zone-define
  validation: 'unit: truth table of (guard x mode x zone) -> decision matches spec'
  status: pending
- id: enforce-soft
  title: 'Soft enforcement path: allow + log + flag + count violation'
  detail: On a soft violation, allow the transition but emit a SoftViolation flag, increment per-edge violation counter, surface a warning in the decision trace. The agent learns the boundary without being blocked.
  deps:
  - enforce-decision
  - stats-update
  validation: 'unit: soft violation increments counter and is queryable; transition still applied'
  status: pending
- id: enforce-hard
  title: 'Hard enforcement path: block + record BlockedAttempt + reason'
  detail: On hard deny, do not move cursor, emit BlockedAttempt event with full reason trace, increment block counter. Mutation is refused atomically (no partial state).
  deps:
  - enforce-decision
  validation: 'unit: hard block leaves cursor+graph unchanged; BlockedAttempt recorded with reason'
  status: pending
- id: enforce-escalation
  title: Auto escalate soft->hard (and demote) on violation thresholds
  detail: 'Configurable: after N soft violations on an edge/zone in a window, promote enforcement to hard; sustained clean usage can demote. Lets the policy harden itself as the agent learns its safe envelope.'
  deps:
  - enforce-soft
  validation: 'unit: N+1th soft violation flips edge to hard; clean window demotes'
  status: pending
- id: enforce-precedence
  title: 'Enforcement precedence: edge vs zone vs global default'
  detail: 'Resolve effective enforcement when edge, zone(s), and global default disagree: documented precedence (edge override > strictest zone > global). Deterministic and explainable.'
  deps:
  - enforce-decision
  - zone-nesting
  validation: 'unit: conflicting levels resolve to documented winner'
  status: pending
- id: stats-model
  title: Intuition stats model per edge/node
  detail: 'Per edge+node: visit_count, success_count, failure_count, soft_violations, blocks, ema_reward, last_visited_seq, confidence. Stored in stats table, updated via events for replayability.'
  deps:
  - store-projection-apply
  - types-core
  validation: 'unit: stats fields persist and replay deterministically'
  status: pending
- id: stats-update
  title: Update stats on transition and on reward
  detail: On TransitionTaken increment visits/recency; on RewardApplied update ema_reward and success/failure. Pure, event-driven so projection rebuild reproduces stats exactly.
  deps:
  - stats-model
  validation: 'unit: sequence of transitions+rewards yields expected stats; rebuild matches'
  status: pending
- id: intuition-suggest
  title: 'suggest(): rank legal moves by learned value (bandit policy)'
  detail: 'Score each legal move by an exploit+explore policy (UCB1 over ema_reward and visit counts; epsilon/Thompson option). Returns ranked transitions with scores+confidence. This is the agent''s intuition: a learned next-move prior.'
  deps:
  - fsm-legal-moves
  - stats-update
  validation: 'unit: high-reward low-visit edge surfaces appropriately under UCB; deterministic with fixed seed'
  status: pending
- id: intuition-reward
  title: 'reward(): apply outcome signal with path credit assignment'
  detail: 'reward(value, {scope}): attribute reward to the recent transition or a decayed window of recent transitions (eligibility trace) so multi-step credit is assigned. Emits RewardApplied events.'
  deps:
  - stats-update
  - history-log
  validation: 'unit: single-step reward updates last edge; trace mode spreads decayed credit over recent path'
  status: pending
- id: intuition-decay
  title: Recency decay so stale priors fade
  detail: Time/seq-based decay applied to ema_reward and confidence so the agent's intuition tracks recent behavior and old paths lose pull. Configurable half-life.
  deps:
  - stats-update
  - config-tunables
  validation: 'unit: untouched edge''s influence decays toward neutral over seq distance'
  status: pending
- id: intuition-confidence
  title: Confidence/uncertainty signal on suggestions
  detail: Expose a confidence per suggestion (function of visit_count + variance) so the agent knows when intuition is weak and should explore or ask. Prevents overtrusting thin data.
  deps:
  - intuition-suggest
  validation: 'unit: low-visit edges report low confidence; grows with data'
  status: pending
- id: engine-facade
  title: 'DState facade: single agent-facing object wiring all subsystems'
  detail: DState class composes store, graph, fsm, zones, policy, intuition, evolve, validate. Synchronous, strongly typed, Result-returning. The one object the LLM agent interacts with directly (no external LLM).
  deps:
  - fsm-transition
  - node-query-fts
  - intuition-suggest
  - zone-boundary-policy
  validation: 'unit: facade exposes the full verb surface; smoke test of a tiny session'
  status: pending
- id: engine-session
  title: 'Session lifecycle: open, boot recovery, autosave, close'
  detail: 'open(path): run store-recovery, acquire lock, hydrate live projection; close(): flush+release lock; autosave/auto-snapshot policy on interval/op-count. Crash-safe at every boundary.'
  deps:
  - engine-facade
  - store-recovery
  - store-concurrency
  validation: 'unit: open->mutate->close->reopen preserves full state and cursor'
  status: pending
- id: engine-api-surface
  title: 'Public verb surface: remember/recall/link/transition/suggest/reward/depend/ready/zone/checkpoint/rollback/validate/explain/render'
  detail: Finalize and document the complete agent verb API as the index barrel. Ergonomic, minimal, typed, each verb one obvious call. This is the surface the agent uses to optimize itself.
  deps:
  - engine-facade
  validation: 'typecheck: all verbs exported and typed; doc comment on each'
  status: pending
- id: config-tunables
  title: Tunable config the agent can adjust to optimize itself
  detail: 'Knobs: default enforcement mode, escalation threshold/window, decay half-life, explore epsilon/UCB c, cache sizes, snapshot interval, retention. Persisted; the agent can read+set them as part of self-optimization.'
  deps:
  - types-core
  - store-schema
  validation: 'unit: set+persist+reload a tunable; out-of-range rejected'
  status: pending
- id: bootstrap-seed
  title: 'Bootstrap seed: minimal initial self-model the agent grows from'
  detail: 'On a fresh store, seed a tiny starter graph (e.g. states: idle->working->verifying->done with a default safe zone) so the agent has a base to evolve rather than a blank void. Optional and overridable.'
  deps:
  - engine-api-surface
  - zone-define
  validation: 'unit: fresh open seeds the starter model; --no-seed yields empty graph'
  status: pending
- id: evolve-add-split-merge
  title: 'Evolution ops: addState / splitState / mergeStates with edge rewiring'
  detail: 'Structural self-edits: splitState clones payload and partitions in/out edges; mergeStates unions payloads and rewires edges, dedup transitions, combine stats. All via events, reversible.'
  deps:
  - engine-api-surface
  - stats-update
  validation: 'unit: split then merge round-trips edge topology; stats combined correctly'
  status: pending
- id: evolve-deprecate-gc
  title: Deprecate + dead-state garbage collection
  detail: Mark unreachable/never-visited states deprecated; gc() archives them and prunes dangling edges (events, reversible). Keeps the working graph lean without losing audit history.
  deps:
  - dag-reachability
  - evolve-add-split-merge
  validation: 'unit: unreachable node gc''d; reachable nodes untouched; reversible'
  status: pending
- id: evolve-migrate
  title: Schema/version migration of node/edge shapes (agent evolves its own model)
  detail: Versioned payload schemas with migration functions; migrate() upgrades all nodes/edges of a kind to a new shape, recording a Migrated event. Lets the agent continuously evolve the model it persists.
  deps:
  - evolve-add-split-merge
  - store-schema
  validation: 'unit: migrate v1->v2 transforms payloads; replay-safe; rollback restores v1'
  status: pending
- id: evolve-optimize
  title: 'optimize(): suggest structural improvements from accumulated signal'
  detail: 'Analyze graph+stats to propose: dead-node gc, redundant/duplicate edge merge, hot-path caching, zone tightening, soft->hard promotion candidates, low-value edge pruning. Returns ranked suggestions the agent can apply. The self-optimization core.'
  deps:
  - evolve-deprecate-gc
  - intuition-suggest
  - enforce-escalation
  validation: 'unit: on a fixture with known redundancy, optimize surfaces the expected suggestions'
  status: pending
- id: evolve-reweight
  title: Bulk reweight edge priors from accumulated stats
  detail: 'reweight(): recompute edge weights from ema_reward/visits to bias suggest() toward proven paths; normalize per source node. Periodic consolidation of intuition into policy.'
  deps:
  - evolve-optimize
  - stats-update
  validation: 'unit: reweight raises weight of high-reward edges, lowers stale ones'
  status: pending
- id: evolve-self-iterate
  title: 'Self-iteration loop: outcome -> stats -> optimize -> apply -> validate'
  detail: A documented closed loop tying transition outcomes into stats, optimize suggestions, agent-applied structural/policy edits, and a validate gate, so the agent iterates on its own abilities safely. Provide a helper that runs one safe iteration and reports deltas.
  deps:
  - evolve-reweight
  - validate-invariants
  validation: 'integration: one iteration improves a measurable policy metric on a fixture without breaking invariants'
  status: pending
- id: validate-invariants
  title: Full invariant checker
  detail: 'validate(): DAG acyclic, FSM well-formed, zone consistency, no dangling guard/edge refs, cursor on live node, hash chain intact, stats reference live edges. Returns a structured report of violations.'
  deps:
  - dag-cycle-check
  - fsm-wellformed
  - zone-nesting
  - hash-chain
  validation: 'unit: each injected violation type detected with precise locus'
  status: pending
- id: validate-repair
  title: Repair/quarantine inconsistencies
  detail: 'repair(): for fixable violations (dangling edge -> remove, orphan stat -> drop, cursor on dead node -> reset to nearest live) emit corrective events; unfixable ones quarantined and reported. Never silently mutates without an event.'
  deps:
  - validate-invariants
  validation: 'unit: dangling edge repaired via event; unfixable flagged not auto-deleted'
  status: pending
- id: validate-integrity
  title: 'Integrity verify: checksums + hash chain corruption report'
  detail: 'verifyIntegrity(): recompute every event checksum, walk the hash chain, report first divergence and affected projection rows. Distinct from invariants (logical) -- this is storage corruption.'
  deps:
  - hash-chain
  - store-events-read
  validation: 'unit: flip a byte in an event payload -> integrity reports exact seq + chain break'
  status: pending
- id: checkpoint-create
  title: Create a named durable checkpoint
  detail: 'checkpoint(name): record a CheckpointCreated event pinning current seq + a snapshot, so the agent can return to a known-good state. Durability + experimentation safety.'
  deps:
  - store-snapshot
  validation: 'unit: checkpoint pins seq; listed and retrievable by name'
  status: pending
- id: checkpoint-rollback
  title: Roll back to a checkpoint
  detail: 'rollback(name): emit compensating events to restore projection to the checkpoint seq (forward-only log, never destructive truncation by default), or fast-path via snapshot reload. Cursor/stats restored.'
  deps:
  - checkpoint-create
  - store-recovery
  validation: 'unit: mutate past checkpoint, rollback restores exact projection+cursor'
  status: pending
- id: checkpoint-branch
  title: Branch/fork state to explore alternatives, then merge or discard
  detail: 'branch(name): clone store to an isolated branch db so the agent can explore an alternative evolution; merge() reconciles or discard() drops it. Enables safe what-if self-optimization.'
  deps:
  - checkpoint-create
  - export-import
  validation: 'unit: branch diverges without affecting main; discard leaves main intact'
  status: pending
- id: explain-trace
  title: 'explain(): why a transition was allowed/denied (policy trace)'
  detail: 'Return the structured decision trace: guard result, enforcement mode source (edge/zone/global), zone boundary status, escalation state. Interpretability so the agent understands its own policy.'
  deps:
  - enforce-decision
  validation: 'unit: explain on a denied transition lists the exact deciding rule'
  status: pending
- id: history-log
  title: History query over transitions and mutations
  detail: 'history({node?,edge?,fromSeq?,limit?}): query the event log as human/agent-readable history (transitions, blocks, rewards, evolutions). Backs reward credit-assignment and audit.'
  deps:
  - store-events-read
  validation: 'unit: history filters by node/edge and returns chronological slice'
  status: pending
- id: render-text
  title: Compact textual digest of cursor + frontier + suggestions (per-turn live view)
  detail: 'render(): ASCII-only digest the agent reads each turn -- current state, legal moves with enforcement+confidence, ready frontier, recent rewards, open violations. No decorative glyphs; arrows as ->. The agent''s at-a-glance state.'
  deps:
  - fsm-legal-moves
  - intuition-suggest
  - dag-ready-frontier
  validation: 'unit: render output is ASCII-only and reflects current cursor+moves'
  status: pending
- id: render-graph
  title: Mermaid/DOT export of the graph (ASCII-safe)
  detail: 'toMermaid()/toDot(): export nodes/edges/zones for visualization, encoding enforcement and zones as styles. Text output only, no decorative unicode in labels.'
  deps:
  - edge-crud
  - zone-define
  validation: 'unit: emitted mermaid parses; nodes/edges/zones present'
  status: pending
- id: metrics
  title: 'Metrics: counts, hot paths, enforcement + intuition aggregates'
  detail: 'metrics(): node/edge/zone counts, most-visited transitions, block/soft-violation rates, mean reward, log size, replay cost estimate. Feeds optimize() and profiling.'
  deps:
  - stats-update
  - store-events-read
  validation: 'unit: metrics on a fixture match hand-computed values'
  status: pending
- id: cli
  title: 'dstate CLI: status/graph/suggest/explain/validate/compact/export/import/history'
  detail: Thin CLI over the facade for inspection and ops. ASCII output. Useful for humans and for the agent to shell out. Subcommands map to verbs.
  deps:
  - engine-api-surface
  - render-text
  - render-graph
  - metrics
  validation: 'e2e: cli status/validate/export run against a temp store and exit 0'
  status: pending
- id: export-import
  title: Full JSON export/import for portability
  detail: 'export(): serialize events (or snapshot+tail) + meta to portable JSON; import(): reconstruct a store from it. Portability across machines; never platform-resident state.'
  deps:
  - store-events-read
  - store-projection-rebuild
  validation: 'unit: export then import into fresh db yields identical projection + integrity'
  status: pending
- id: error-model
  title: Typed error/Result model; never throw raw on agent input
  detail: All agent-facing verbs return Result<T,DStateError> with a typed code (CycleRejected, IllegalTransition, HardBlocked, GuardParseError, IntegrityBroken, LockHeld, NotFound, ...). Internal invariants may assert; agent inputs never crash the engine.
  deps:
  - types-core
  validation: 'unit: each error path returns its typed code, no uncaught throw on bad input'
  status: pending
- id: edgecase-empty-overflow-reentry
  title: 'Degenerate cases: empty graph, overflow, reentry, self-loop, single node'
  detail: 'Handle: empty graph (no cursor, suggest=[]), huge payload (size cap + error), deep DAG (no stack overflow in topo/cycle -> iterative), reentry (transition to current node = self-loop policy), single-node graph, duplicate ids, unicode/control chars in labels.'
  deps:
  - fsm-transition
  - dag-topo
  - node-crud
  validation: 'unit: each degenerate input handled with defined behavior, no crash/stack overflow'
  status: pending
- id: security-guard-sandbox
  title: 'Security: guard DSL cannot escape to host (no eval/Function/proto access)'
  detail: Adversarial tests proving the guard interpreter rejects property access to constructor/__proto__/globalThis, has no host bindings, bounds execution (no unbounded loops; DSL is loop-free), and caps expression size/depth.
  deps:
  - guard-expr
  validation: 'unit: battery of injection payloads all rejected; no host effect observed'
  status: pending
- id: security-input-validation
  title: 'Security: input validation + parameterized SQL everywhere'
  detail: All ids validated against a charset; payload JSON size-capped; every SQL via bound parameters (no string interpolation); FTS query sanitized. Prevents injection and resource exhaustion.
  deps:
  - node-crud
  - node-query-fts
  - store-schema
  validation: 'unit: SQL-injection-shaped id/payload/query cannot break out; oversized input rejected'
  status: pending
- id: perf-bench
  title: Profiling/benchmark harness on a large graph + hot loop
  detail: 'Bench: build 10k nodes / 50k edges, run a hot transition+suggest loop, measure append latency, projection apply, suggest, recovery time, snapshot size. Assert sane thresholds and catch O(n) regressions in hot paths (indices used, no full scans).'
  deps:
  - engine-api-surface
  - store-compaction
  validation: bench runs; transition+suggest under target ms; recovery bounded by snapshot+tail
  status: pending
- id: proj-agents-md
  title: 'AGENTS.md: project hard rules for any agent using dstate'
  detail: 'Project-tracked hard rules: event-sourced spine is the only mutation path, never hard-delete, all agent input via Result verbs, guard DSL only (no eval), ASCII-only output, push-on-clean. Portable memory surface, not platform-resident.'
  deps:
  - proj-scaffold
  validation: AGENTS.md present at root with the rule set
  status: pending
- id: docs-readme
  title: README + design doc + API reference
  detail: 'README: concept (DAG+FSM as memory/policy/intuition), architecture (event-sourced sqlite), the verb API with examples, soft/hard enforcement, self-evolution loop, durability/perf notes, ASCII diagrams. The agent-facing manual.'
  deps:
  - engine-api-surface
  - dep-survey
  validation: README covers every public verb with a runnable example
  status: pending
- id: test-events-hashchain
  title: 'Tests: event append, monotonic seq, checksum + hash chain'
  detail: Cover append ordering, chain linkage, tamper detection localization, checksum mismatch.
  deps:
  - store-events-append
  - hash-chain
  validation: bun test green for events+hashchain suite
  status: pending
- id: test-projection-recovery
  title: 'Tests: projection apply vs rebuild, snapshot, crash recovery'
  detail: Cover incremental==rebuild equivalence, snapshot+tail==full, truncated trailing event recovery, corruption truncation to last good seq.
  deps:
  - store-recovery
  - store-snapshot
  validation: bun test green for projection+recovery suite
  status: pending
- id: test-node-edge-crud
  title: 'Tests: node/edge CRUD, recall (FTS+fallback), versioning, archive'
  detail: Cover roundtrips, version bump, archive visibility, FTS match + LIKE fallback, missing-endpoint rejection.
  deps:
  - node-query-fts
  - edge-crud
  validation: bun test green for node/edge suite
  status: pending
- id: test-dag
  title: 'Tests: DAG cycle rejection, topo, ready-frontier, reachability'
  detail: Cover cycle path reporting, topo correctness + cache invalidation, frontier advancement, ancestors/descendants, deep-DAG iterative (no stack overflow).
  deps:
  - dag-ready-frontier
  - dag-reachability
  - edgecase-empty-overflow-reentry
  validation: bun test green for dag suite
  status: pending
- id: test-fsm-zones
  title: 'Tests: FSM transition, legal moves, zones, boundary crossing'
  detail: Cover legal/illegal transitions, cursor persistence, multi-cursor, zone intra vs boundary, gated crossing, nesting precedence, zone-mapout derivation.
  deps:
  - fsm-legal-moves
  - zone-mapout
  - zone-nesting
  validation: bun test green for fsm+zones suite
  status: pending
- id: test-enforcement
  title: 'Tests: soft/hard enforcement, escalation, precedence, explain'
  detail: Cover soft allow+count, hard block+BlockedAttempt, escalation flip+demote, edge/zone/global precedence, explain trace correctness.
  deps:
  - enforce-escalation
  - enforce-precedence
  - explain-trace
  validation: bun test green for enforcement suite
  status: pending
- id: test-intuition
  title: 'Tests: stats, suggest (bandit), reward credit, decay, confidence'
  detail: Cover stats update+replay determinism, UCB ranking, single+trace reward credit, decay half-life, confidence growth. Fixed seed for determinism.
  deps:
  - intuition-suggest
  - intuition-reward
  - intuition-decay
  - intuition-confidence
  validation: bun test green for intuition suite
  status: pending
- id: test-evolve
  title: 'Tests: split/merge, deprecate/gc, migrate, optimize, reweight, self-iterate'
  detail: Cover topology round-trips, gc reachability, migration up/rollback, optimize suggestions on known fixtures, reweight effects, one safe self-iteration improving a metric.
  deps:
  - evolve-self-iterate
  validation: bun test green for evolve suite
  status: pending
- id: test-validate-integrity
  title: 'Tests: invariant checker, repair, integrity verify'
  detail: Cover each invariant violation detection, safe repair via events, unfixable quarantine, byte-flip integrity localization.
  deps:
  - validate-repair
  - validate-integrity
  validation: bun test green for validate+integrity suite
  status: pending
- id: test-checkpoint-branch
  title: 'Tests: checkpoint create/rollback, branch/merge/discard'
  detail: Cover checkpoint pin, rollback restores projection+cursor, branch isolation, discard non-effect, merge reconciliation.
  deps:
  - checkpoint-branch
  - checkpoint-rollback
  validation: bun test green for checkpoint+branch suite
  status: pending
- id: test-concurrency
  title: 'Tests: single-writer lock, optimistic version conflict'
  detail: Cover lock acquisition failure on second writer, stale-version write rejection, busy_timeout behavior.
  deps:
  - store-concurrency
  validation: bun test green for concurrency suite
  status: pending
- id: test-cli-exportimport
  title: 'Tests: CLI subcommands + export/import roundtrip'
  detail: Cover cli status/validate/export/history exit codes + output shape, and export->import projection identity.
  deps:
  - cli
  - export-import
  validation: bun test green for cli+portability suite
  status: pending
- id: git-init-commit-push
  title: git init, commit the build, push (or flag missing remote)
  detail: Initialize git (repo currently absent), managed .gitignore block for .gm witness/runtime, commit the full dstate build, and push if an origin remote exists; if none configured, surface as blockedBy external (user must provide remote).
  deps:
  - test-cli-exportimport
  - docs-readme
  - perf-bench
  validation: git status clean after commit; push succeeds or missing-remote reported
  status: pending
